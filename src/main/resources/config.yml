# ZRestart configuration
config-version: 2

settings:
  # See the admin README at https://github.com/Zenologia/ZRestart for valid timezones.
  timezone: "America/New_York"
  fallback-timezone: "UTC"
  check-restart-script: true
  papi-placeholders: true

schedule:
  enabled: true
  entries:
    - "Daily;05;00;Daily maintenance"
    - "Monday;11;00;Weekly maintenance"
    - "Friday;22;00"

countdown:
  warning-times:
    - 30m
    - 15m
    - 5m
    - 1m
    - 30s
    - 5s
    - 4s
    - 3s
    - 2s
    - 1s

  chat:
    enabled: true

  title:
    enabled: false
    fade-in: 10
    stay: 40
    fade-out: 10

  boss-bar:
    enabled: false
    # Options: PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
    color: RED
    # Options: PROGRESS, NOTCHED_6, NOTCHED_10, NOTCHED_12, NOTCHED_20
    overlay: PROGRESS
    show-from: 5m
    # true shrinks the bar with the countdown; false keeps it full.
    progress: true

  sounds:
    enabled: false
    # Options: MASTER, MUSIC, RECORDS, WEATHER, BLOCKS, HOSTILE, NEUTRAL, PLAYERS, AMBIENT, VOICE, UI
    category: MASTER
    # Each time must also exist in countdown.warning-times.
    # Bukkit sound names: https://jd.papermc.io/paper/26.1.2/org/bukkit/Sound.html
    # Minecraft sound keys: https://mcasset.cloud/26.1/assets/minecraft/sounds.json
    entries:
      - time: 30m
        sound: BLOCK_NOTE_BLOCK_PLING
        volume: 1.0
        pitch: 1.0
      - time: 5s
        sound: minecraft:block.note_block.pling
        volume: 1.0
        pitch: 1.5

formatting:
  minimessage: true
  legacy-ampersand-colors: true
  empty-reason: "No reason provided"
  time-format:
    include-days: true
    include-hours: true
    include-minutes: true
    include-seconds: true
    compact: false

pre-restart-commands:
  enabled: false
  failure-behavior: CONTINUE # Options are CONTINUE or ABORT
  commands:
    - "save-all"
